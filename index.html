<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple UI Component Library</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>

<header class="header">
  <h1>Simple UI Component Library</h1>
</header>

<nav class="nav">
  <a href="#">Home</a>
  <a href="#">Components</a>
  <a href="#">Contact</a>
</nav>

<main class="container">

  <section class="card">
    <h2>Buttons</h2>
    <button class="btn btn--primary">Primary</button>
    <button class="btn btn--secondary">Secondary</button>
  </section>

  <section class="card">
    <h2>Card Component</h2>
    <p>This is a reusable card built using HTML and CSS.</p>
  </section>

  <section class="card">
    <h2>Form Component</h2>

    <form>
      <input type="text" placeholder="Your Name">
      <input type="email" placeholder="Email">
      <button class="btn btn--primary">Submit</button>
    </form>

  </section>

  <section class="card">
    <h2>Alert Box</h2>

    <div class="alert">
      This is a sample alert component.
    </div>

  </section>

  <section class="card">
    <h2>Badge</h2>

    <span class="badge">New</span>

  </section>

</main>

<footer class="footer">
  UI Component Library Demo
</footer>

</body>
</html>
